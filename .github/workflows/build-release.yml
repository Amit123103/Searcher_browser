name: Build Multi-Platform Releases

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows (EXE)
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 PyQt6-WebEngine requests pyinstaller
      
      - name: Build Windows executable with PyInstaller
        run: |
          pyinstaller --name Searcher --onefile --windowed --add-data "assets;assets" main.py
      
      - name: Verify build
        run: |
          if (Test-Path "dist/Searcher.exe") { 
            Write-Host "✓ Searcher.exe built successfully"
          } else {
            Write-Host "✗ Build failed"
            exit 1
          }
      
      - name: Upload Windows EXE
        uses: actions/upload-artifact@v3
        with:
          name: searcher-windows-exe
          path: dist/Searcher.exe
          retention-days: 5


  build-macos:
    runs-on: macos-latest
    name: Build macOS (DMG/App)
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 PyQt6-WebEngine requests pyinstaller
      
      - name: Build macOS app
        run: |
          pyinstaller --name Searcher --onedir --windowed --add-data "assets:assets" main.py
      
      - name: Verify build
        run: |
          if [ -d "dist/Searcher.app" ]; then
            echo "✓ Searcher.app built successfully"
          else
            echo "✗ Build failed"
            exit 1
          fi
      
      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Searcher" \
            --window-x 200 --window-y 120 \
            --window-width 600 --window-height 300 \
            --icon-size 100 \
            --icon "Searcher.app" 175 120 \
            --app-drop-link 425 120 \
            "dist/Searcher.dmg" \
            "dist/"
      
      - name: Upload macOS App
        uses: actions/upload-artifact@v3
        with:
          name: searcher-macos-app
          path: dist/Searcher.app
          retention-days: 5
      
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v3
        with:
          name: searcher-macos-dmg
          path: dist/Searcher.dmg
          retention-days: 5


  build-linux:
    runs-on: ubuntu-latest
    name: Build Linux (AppImage)
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libqt6gui6 libqt6core6 libgl1-mesa-glx libxkbcommon-x11-0 patchelf
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 PyQt6-WebEngine requests pyinstaller
      
      - name: Build Linux executable
        run: |
          pyinstaller --name Searcher --onedir --add-data "assets:assets" main.py
      
      - name: Verify build
        run: |
          if [ -f "dist/Searcher/Searcher" ]; then
            echo "✓ Searcher executable built successfully"
          else
            echo "✗ Build failed"
            exit 1
          fi
      
      - name: Download AppImage tools
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
      
      - name: Create AppImage
        run: |
          ./linuxdeploy-x86_64.AppImage --appdir dist/Searcher --output appimage
      
      - name: List created files
        run: ls -lah Searcher*.AppImage 2>/dev/null || echo "AppImage creation attempted"
      
      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v3
        with:
          name: searcher-linux-appimage
          path: Searcher*.AppImage
          retention-days: 5
      
      - name: Upload Linux Executable
        uses: actions/upload-artifact@v3
        with:
          name: searcher-linux-exe
          path: dist/Searcher
          retention-days: 5


  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    name: Create GitHub Release
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: release-artifacts
      
      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          find release-artifacts -type f -exec ls -lh {} \;
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.dmg
            release-artifacts/**/*.AppImage
            release-artifacts/searcher-linux-exe/Searcher
          body: |
            # Searcher Browser ${{ github.ref_name }}
            
            Cross-platform desktop browser with AI Assistant, Ad Blocker, and more!
            
            ## 📥 Download
            
            - **Windows**: `Searcher.exe` (portable) or use installer
            - **macOS**: `Searcher.dmg` (drag to Applications)
            - **Linux**: `Searcher.AppImage` (make executable and run)
            
            ## 🚀 Quick Start
            
            ### Windows
            ```
            1. Download Searcher.exe
            2. Double-click to run
            ```
            
            ### macOS
            ```
            1. Download Searcher.dmg
            2. Double-click to mount
            3. Drag Searcher.app to Applications
            4. Launch from Applications
            ```
            
            ### Linux
            ```
            chmod +x Searcher.AppImage
            ./Searcher.AppImage
            ```
            
            ## ✨ Features
            - 🤖 AI Assistant (summarize, Q&A, notes)
            - 🛡️ Ad Blocker & Privacy Mode
            - 📱 Responsive Design
            - 🔍 Custom Search with DuckDuckGo
            - 💾 Offline Support
            
            ## 📖 Documentation
            See [GitHub Repository](https://github.com/Amit123103/Searcher_browser) for full docs.
            
            Enjoy! 🎉
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
