<!DOCTYPE html>
<html>
<head>
    <title>Page Load Error - Searcher</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #202124; 
            color: #e8eaed; 
        }
        .error-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        .error-code { 
            font-size: 3rem; 
            font-weight: bold; 
            color: #f28b82; 
            margin-bottom: 10px; 
        }
        .error-message { 
            font-size: 1.2rem; 
            margin-bottom: 40px; 
            color: #9aa0a6;
            text-align: center;
            max-width: 80%;
        }
        button { 
            padding: 12px 25px; 
            border-radius: 6px; 
            border: none; 
            background-color: #8ab4f8; 
            color: #202124; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            transition: background 0.2s;
        }
        button:hover {
            background-color: #aecbf9;
        }
    </style>
</head>
<body>
    <div class="error-icon">🌐</div>
    <div class="error-code">Hmm, we can't reach this page.</div>
    <div class="error-message">Check your internet connection or verify the address is correct.</div>
    <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
