<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Searcher Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0B1220;
            --surface-color: #1E293B;
            --primary-color: #3B82F6;
            --primary-light: #60A5FA;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --glass-bg: rgba(11, 18, 32, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0B1220 0%, #1a2332 100%);
            color: var(--text-main);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            margin-bottom: 30px;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: var(--primary-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 600;
        }

        .search-info {
            margin-left: auto;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .result-count {
            color: var(--text-muted);
            font-size: 14px;
        }

        .result-time {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Search Results */
        .results {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .result-item {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .result-item:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            transform: translateX(4px);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.2);
        }

        .result-url {
            color: var(--primary-light);
            font-size: 12px;
            text-decoration: none;
            margin-bottom: 6px;
            display: block;
        }

        .result-title {
            color: var(--primary-light);
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            text-decoration: none;
            display: block;
            word-wrap: break-word;
        }

        .result-title:hover {
            text-decoration: underline;
        }

        .result-description {
            color: var(--text-main);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .result-icon {
            display: inline-block;
            width: 24px;
            height: 24px;
            background: var(--surface-color);
            border-radius: 6px;
            margin-right: 8px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .empty-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-text {
            color: var(--text-muted);
            font-size: 16px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid var(--glass-border);
            border-top: 3px solid var(--primary-light);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 16px;
            color: var(--text-muted);
        }

        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--primary-color);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: var(--primary-light);
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="history.back()">← Go Back</button>
        
        <div class="header">
            <div class="logo">S</div>
            <div class="logo-text">Searcher Results</div>
            <div class="search-info">
                <span class="result-count" id="resultCount">Loading results...</span>
            </div>
        </div>

        <div id="resultsContainer" class="results"></div>
    </div>

    <script>
        // Get query from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('q');

        if (query) {
            document.title = `${query} - Searcher Results`;
            fetchSearchResults(query);
        } else {
            showEmpty();
        }

        async function fetchSearchResults(searchQuery) {
            const container = document.getElementById('resultsContainer');
            
            // Show loading state
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div class="loading-text">🔍 Searching for "${searchQuery}"...</div>
                </div>
            `;

            try {
                // Try multiple search sources
                let results = [];

                // Try DuckDuckGo API
                try {
                    const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(searchQuery)}&format=json`, {
                        mode: 'cors'
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        
                        if (data.Results && data.Results.length > 0) {
                            data.Results.forEach((result, index) => {
                                results.push({
                                    title: result.Title,
                                    url: result.FirstURL,
                                    description: result.Text,
                                    index: index + 1
                                });
                            });
                        }

                        if (results.length === 0 && data.RelatedTopics && data.RelatedTopics.length > 0) {
                            data.RelatedTopics.slice(0, 10).forEach((topic, index) => {
                                if (topic.FirstURL) {
                                    results.push({
                                        title: topic.Text || topic.Result || 'Related Topic',
                                        url: topic.FirstURL,
                                        description: 'Related - ' + (topic.Result || 'Click to explore'),
                                        index: index + 1
                                    });
                                }
                            });
                        }
                    }
                } catch (e) {
                    console.log('DuckDuckGo API failed, trying alternative...');
                }

                // If still no results, try Google via custom search (simulated)
                if (results.length === 0) {
                    results = generateMockResults(searchQuery);
                }

                if (results.length > 0) {
                    displayResults(results, searchQuery);
                } else {
                    showNoResults(searchQuery);
                }
            } catch (error) {
                console.error('Search error:', error);
                // Show mock results as fallback
                const mockResults = generateMockResults(searchQuery);
                if (mockResults.length > 0) {
                    displayResults(mockResults, searchQuery);
                } else {
                    showError(searchQuery);
                }
            }
        }

        function generateMockResults(query) {
            // Generate relevant mock results based on search query
            const mockData = {
                'hello': [
                    { title: 'Hello World - Wikipedia', url: 'https://en.wikipedia.org/wiki/Hello_world_program', description: 'Hello World is a simple program often used to introduce beginners to a new programming language.' },
                    { title: 'Hello Meaning in English - Cambridge Dictionary', url: 'https://dictionary.cambridge.org/dictionary/english/hello', description: 'Definition of hello from the Cambridge Dictionary.' },
                    { title: 'Hello Song | Kids Songs', url: 'https://www.youtube.com/watch?v=hello', description: 'Educational songs for children to learn basic greetings.' }
                ],
                'python': [
                    { title: 'Python.org - Official Website', url: 'https://www.python.org/', description: 'Python is a high-level, interpreted, general-purpose programming language.' },
                    { title: 'Python Tutorial - W3Schools', url: 'https://www.w3schools.com/python/', description: 'Learn Python with our comprehensive tutorial covering basics to advanced topics.' },
                    { title: 'Python Documentation', url: 'https://docs.python.org/', description: 'Official Python documentation with guides, references, and tutorials.' }
                ],
                'javascript': [
                    { title: 'JavaScript.com - Learn JavaScript', url: 'https://www.javascript.com/', description: 'JavaScript is a lightweight and interpreted programming language.' },
                    { title: 'MDN Web Docs - JavaScript', url: 'https://developer.mozilla.org/en-US/docs/Web/JavaScript', description: 'Comprehensive JavaScript documentation and tutorials.' },
                    { title: 'JavaScript Tutorial - W3Schools', url: 'https://www.w3schools.com/js/', description: 'Learn JavaScript from beginner to advanced levels.' }
                ],
                'web development': [
                    { title: 'Web Development Roadmap 2024', url: 'https://roadmap.sh/frontend', description: 'Complete roadmap for becoming a web developer.' },
                    { title: 'MDN Web Docs - Learn Web Development', url: 'https://developer.mozilla.org/en-US/docs/Learn', description: 'Free courses and tutorials for web development.' },
                    { title: 'FreeCodeCamp - Web Development', url: 'https://www.freecodecamp.org/', description: 'Learn to code for free with interactive projects.' }
                ]
            };

            // Check for exact or partial matches
            let results = mockData[query.toLowerCase()];
            
            if (!results) {
                // Try to find partial match
                for (const key in mockData) {
                    if (query.toLowerCase().includes(key) || key.includes(query.toLowerCase())) {
                        results = mockData[key];
                        break;
                    }
                }
            }

            // If still no match, generate generic results
            if (!results) {
                results = [
                    { 
                        title: `${query} - Wikipedia`, 
                        url: `https://en.wikipedia.org/wiki/${query.replace(/\s+/g, '_')}`, 
                        description: `Learn more about ${query} on Wikipedia with comprehensive information.` 
                    },
                    { 
                        title: `${query} - Dictionary Definition`, 
                        url: `https://www.merriam-webster.com/dictionary/${query}`, 
                        description: `Find the definition and meaning of ${query}.` 
                    },
                    { 
                        title: `${query} - Stack Overflow`, 
                        url: `https://stackoverflow.com/search?q=${query}`, 
                        description: `Community questions and answers about ${query}.` 
                    },
                    { 
                        title: `${query} - GitHub`, 
                        url: `https://github.com/search?q=${query}`, 
                        description: `Open source projects and repositories related to ${query}.` 
                    },
                    { 
                        title: `${query} - YouTube`, 
                        url: `https://www.youtube.com/results?search_query=${query}`, 
                        description: `Video tutorials and content about ${query}.` 
                    }
                ];
            }

            return results;
        }

        function displayResults(results, query) {
            const container = document.getElementById('resultsContainer');
            const countElement = document.getElementById('resultCount');
            
            countElement.textContent = `${results.length} results for "${query}"`;

            container.innerHTML = results.map((result, idx) => {
                try {
                    const domain = new URL(result.url).hostname;
                    return `
                        <div class="result-item" onclick="window.open('${result.url}', '_blank')">
                            <span class="result-url">${domain}</span>
                            <a href="${result.url}" target="_blank" class="result-title">${result.title}</a>
                            <div class="result-description">${result.description}</div>
                            <span class="result-icon">🔗</span>
                        </div>
                    `;
                } catch (e) {
                    return `
                        <div class="result-item" onclick="window.open('${result.url}', '_blank')">
                            <span class="result-url">Link</span>
                            <a href="${result.url}" target="_blank" class="result-title">${result.title}</a>
                            <div class="result-description">${result.description}</div>
                            <span class="result-icon">🔗</span>
                        </div>
                    `;
                }
            }).join('');
        }

        function showNoResults(query) {
            document.getElementById('resultsContainer').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🔍</div>
                    <div class="empty-title">No results found</div>
                    <div class="empty-text">Try different keywords or check your spelling for "${query}"</div>
                </div>
            `;
            document.getElementById('resultCount').textContent = 'No results';
        }

        function showEmpty() {
            document.getElementById('resultsContainer').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📝</div>
                    <div class="empty-title">No Search Query</div>
                    <div class="empty-text">Go back and try searching for something</div>
                </div>
            `;
        }

        function showError(query) {
            document.getElementById('resultsContainer').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">⚠️</div>
                    <div class="empty-title">Search Error</div>
                    <div class="empty-text">Unable to fetch results for "${query}". Please try again later.</div>
                </div>
            `;
        }
    </script>
</body>
</html>
