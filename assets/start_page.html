<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Searcher - New Tab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0B1220;
            --surface-color: #1E293B;
            --primary-color: #3B82F6;
            --primary-light: #60A5FA;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --glass-bg: rgba(11, 18, 32, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Main Workspace */
        .workspace {
            display: flex;
            flex-grow: 1;
            height: 100vh;
        }

        /* Left Sidebar */
        .left-sidebar {
            width: 64px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 0;
            gap: 24px;
            z-index: 50;
        }
        
        .sidebar-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .sidebar-icon svg { width: 20px; height: 20px; }
        .sidebar-icon:hover {
            color: var(--primary-light);
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }
        .sidebar-icon.active {
            color: var(--primary-light);
            background: rgba(59, 130, 246, 0.15);
        }
        .sidebar-icon.active::before {
            content: '';
            position: absolute;
            left: -2px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 20px;
            background: var(--primary-color);
            border-radius: 0 4px 4px 0;
        }
        .sidebar-spacer { flex-grow: 1; }

        /* Center Content */
        .center-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .logo-large {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }
        .logo-large-icon {
            width: 80px;
            height: 80px;
            background: var(--primary-color);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
            margin-bottom: 16px;
        }
        .logo-large-text {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
        }

        .main-search-container {
            width: 100%;
            max-width: 680px;
            position: relative;
            margin-bottom: 50px;
            animation: fadeInUp 0.8s ease-out;
        }
        .main-search-input {
            width: 100%;
            padding: 20px 24px 20px 60px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(11, 18, 32, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-main);
            font-size: 18px;
            outline: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        .main-search-input:focus {
            background: rgba(11, 18, 32, 0.9);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2), 0 10px 30px rgba(0,0,0,0.4);
        }
        .main-search-input::placeholder { color: #CBD5E1; }
        
        .search-suggestions {
            position: absolute;
            top: calc(100% + 12px);
            left: 0;
            right: 0;
            background: rgba(11, 18, 32, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            z-index: 100;
            overflow: hidden;
        }
        .suggestion-item {
            padding: 14px 24px;
            color: #c9d1d9;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .suggestion-item:last-child {
            border-bottom: none;
        }
        .suggestion-item:hover {
            background: rgba(59, 130, 246, 0.1);
            color: #38bdf8;
            padding-left: 32px;
        }
        
        .main-search-icon {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: #94A3B8;
        }
        .main-search-actions {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 12px;
        }
        .main-search-actions svg {
            width: 20px; height: 20px; color: #94A3B8; cursor: pointer; transition: color 0.2s;
        }
        .main-search-actions svg:hover { color: var(--primary-light); }

        .quick-access {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 1s ease-out;
        }
        .quick-card {
            width: 110px;
            height: 110px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .quick-card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(30, 41, 59, 0.85);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 12px 25px rgba(0,0,0,0.4);
        }
        .quick-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--surface-color);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .quick-icon img { width: 24px; height: 24px; }
        .quick-icon svg { width: 24px; height: 24px; color: var(--text-main); }
        .quick-text { font-size: 13px; font-weight: 500; }

        /* AI Panel Right */
        .ai-panel {
            width: 320px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-left: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            z-index: 50;
            box-shadow: -10px 0 30px rgba(0,0,0,0.2);
        }

        .ai-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .ai-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ai-title-icon { color: var(--primary-light); }
        .ai-close { color: var(--text-muted); cursor: pointer; transition: color 0.2s; }
        .ai-close:hover { color: var(--text-main); }

        .ai-greeting {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .ai-greeting span { display: inline-block; animation: wave 2s infinite; transform-origin: 70% 70%; }
        .ai-subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }

        .ai-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: auto;
        }
        .ai-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        .ai-btn svg { width: 18px; height: 18px; color: var(--text-muted); transition: color 0.2s; }
        .ai-btn:hover {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.3);
            transform: translateX(4px);
        }
        .ai-btn:hover svg { color: var(--primary-light); }

        .ai-input-container {
            margin-top: 24px;
            position: relative;
        }
        .ai-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 14px 44px 14px 16px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        .ai-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            background: rgba(0,0,0,0.4);
        }
        .ai-send {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            background: var(--primary-color);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }
        .ai-send svg { width: 14px; height: 14px; color: white; }
        .ai-send:hover { background: var(--primary-light); }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes wave {
            0% { transform: rotate( 0.0deg) }
            10% { transform: rotate(14.0deg) }
            20% { transform: rotate(-8.0deg) }
            30% { transform: rotate(14.0deg) }
            40% { transform: rotate(-4.0deg) }
            50% { transform: rotate(10.0deg) }
            60% { transform: rotate( 0.0deg) }
            100% { transform: rotate( 0.0deg) }
        }
    </style>
</head>
<body>

    <div class="workspace">
        
        <!-- Left Sidebar -->
        <div class="left-sidebar">
            <div class="sidebar-icon active" title="Bookmarks">

            </div>
        </div>

        <!-- Center Content -->
        <div class="center-content">
            <div class="logo-large">
                <div class="logo-large-icon">S</div>
                <div class="logo-large-text">Searcher</div>
            </div>

            <div class="main-search-container">
                <svg class="main-search-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" id="searchInput" class="main-search-input" placeholder="What do you want to know?" autofocus>
                <div id="searchSuggestions" class="search-suggestions" style="display: none;">
                    <div class="suggestion-item">🔍 Search with Google</div>
                    <div class="suggestion-item">🎯 Quick Answer</div>
                    <div class="suggestion-item">📚 Research</div>
                    <div class="suggestion-item">💡 New Ideas</div>
                </div>
                <div class="main-search-actions">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" title="Voice Search"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary-color)" title="Search with AI"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></svg>
                </div>

                </div>
                <div class="quick-card">
                    <div class="quick-icon" style="background:#0A66C2"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg></div>
                    <div class="quick-text">LinkedIn</div>
                </div>
                <div class="quick-card">
                    <div class="quick-icon" style="background:#FF4500"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="8" x2="16" y1="12" y2="12"/><line x1="12" x2="12" y1="8" y2="16"/></svg></div>

        <!-- AI Assistant Panel -->
        <div class="ai-panel">
            <div class="ai-header">
                <div class="ai-title">
                    <svg class="ai-title-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>

                </div>
                <svg class="ai-close" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>

            <div class="ai-greeting">Hello! <span>👋</span></div>

            <div class="ai-actions">
                <button class="ai-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>
                    Summarize this page
                </button>
                <button class="ai-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
                    Ask a question
                </button>
                <button class="ai-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    Generate notes
                </button>
                <button class="ai-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                    Explain this content
                </button>
            </div>
            
            <div class="ai-input-container">
                <input type="text" class="ai-input" placeholder="Ask anything...">
                <button class="ai-send">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                </button>
            </div>
        </div>
    </div>
    
    <script>
        const searchInput = document.getElementById('searchInput');
        const searchSuggestions = document.getElementById('searchSuggestions');
        const suggestionItems = document.querySelectorAll('.suggestion-item');
        
        // Show suggestions when search input is focused
        searchInput.addEventListener('focus', function() {
            if (searchInput.value === '') {
                searchSuggestions.style.display = 'block';
            }
        });
        
        // Hide suggestions when input loses focus (with delay to allow click)
        searchInput.addEventListener('blur', function() {
            setTimeout(() => {
                searchSuggestions.style.display = 'none';
            }, 200);
        });
        
        // Show suggestions when typing
        searchInput.addEventListener('input', function() {
            if (this.value !== '') {
                searchSuggestions.style.display = 'block';
            } else {
                searchSuggestions.style.display = 'block';
            }
        });
        
        // Handle suggestion click
        suggestionItems.forEach(item => {
            item.addEventListener('click', function() {
                const query = searchInput.value || this.textContent;
                performSearch(query);
            });
        });
        
        // Make the search input work
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch(this.value);
            }
        });
        
        function performSearch(query) {
            if (query) {
                if (query.startsWith('http://') || query.startsWith('https://')) {
                    window.location.href = query;
                } else if (query.includes('.') && !query.includes(' ') && !query.includes('Search') && !query.includes('Quick') && !query.includes('Research') && !query.includes('Ideas')) {
                    window.location.href = 'https://' + query;
                } else {
                    // Use custom Searcher search results page instead of Google
                    window.location.href = 'search_results.html?q=' + encodeURIComponent(query);
                }
            }
        }
        
        // Hide address bar for fullscreen experience (works in some browsers)
        window.scrollTo(0, 1);
    </script>
